name: Autoping Render

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://youtube-downloader.onrender.com/health)
          echo "Health check status: $response"
          if [ "$response" != "200" ]; then
            echo "WARNING: Backend responded with $response"
          fi
