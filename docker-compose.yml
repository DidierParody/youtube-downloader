# -----------------------------------------------------------------------------
# YouTube Downloader - Local Development Environment
# -----------------------------------------------------------------------------
# Services:
#   - PostgreSQL 15+ (with pgvector)
#   - Redis
#   - Redpanda (Kafka-compatible)
#   - MinIO (S3-compatible)
#   - DuckDB (analytics)
# --------------------------------------------------------------------------

version: "3.9"

x-common-variables: &common-variables
  GO_ENV: development
  LOG_LEVEL: debug

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ytd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ytd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ytd_password}
      POSTGRES_DB: ${POSTGRES_DB:-ytd_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - ytd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ytd} -d ${POSTGRES_DB:-ytd_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ytd-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes;
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ytd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redpanda (single node for local development)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.17
    container_name: ytd-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - "internal://0.0.0.0:9092,external://0.0.0.0:19092"
      - --advertise-kafka-addr
      - "internal://redpanda:9092,external://localhost:19092"
      - --pandaproxy-addr
      - "internal://0.0.0.0:8082,external://0.0.0.0:18082"
      - --advertise-pandaproxy-addr
      - "internal://redpanda:8082,external://localhost:18082"
      - --schema-registry-addr
      - "internal://0.0.0.0:8081,external://0.0.0.0:18081"
      - --rpc-addr
      - "0.0.0.0:33145"
      - --rpc-server-addr
      - "0.0.0.0:33145"
      - --default-log-level=info
      - --set
      - "redpanda.enable_transactions=true"
      - --set
      - "redpanda.enable_idempotence=true"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "19092:19092"   # Kafka API (external)
      - "9092:9092"     # Kafka API (internal)
      - "18081:18081"   # Schema Registry (external)
      - "8081:8081"     # Schema Registry (internal)
      - "18082:18082"   # Pandaproxy (external)
      - "8082:8082"     # Pandaproxy (internal)
      - "9644:9644"     # Admin API
    networks:
      - ytd-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-05T22-17-24Z
    container_name: ytd-minio
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - ytd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Create MinIO buckets on startup
  # ---------------------------------------------------------------------------
  minio-createbuckets:
    image: minio/mc:RELEASE.2024-01-05T05-04-32Z
    container_name: ytd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add ytdminio http://minio:${MINIO_PORT:-9000} ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing ytdminio/${MINIO_BUCKET_VIDEOS:-ytd-videos};
      /usr/bin/mc mb --ignore-existing ytdminio/${MINIO_BUCKET_THUMBNAILS:-ytd-thumbnails};
      /usr/bin/mc mb --ignore-existing ytdminio/${MINIO_BUCKET_EXPORTS:-ytd-exports};
      /usr/bin/mc policy set download ytdminio/${MINIO_BUCKET_VIDEOS:-ytd-videos};
      /usr/bin/mc policy set download ytdminio/${MINIO_BUCKET_THUMBNAILS:-ytd-thumbnails};
      "
    networks:
      - ytd-network

  # ---------------------------------------------------------------------------
  # DuckDB (analytics)
  # ---------------------------------------------------------------------------
  duckdb:
    image: datacoves/duckdb:latest
    container_name: ytd-duckdb
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      MOTHERDUCK_TOKEN: ${MOTHERDUCK_TOKEN:-}
    volumes:
      - duckdb_data:/duckdb/data
      - ./data-platform:/workspace:rw
    working_dir: /duckdb/data
    networks:
      - ytd-network
    healthcheck:
      test: ["CMD", "duckdb", "-c", "SELECT 1;"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend API (development mode with hot reload)
  # ---------------------------------------------------------------------------
  backend-api:
    profiles:
      - full
    build:
      context: backend/
      dockerfile: Dockerfile
      target: development
    container_name: ytd-backend-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      <<: *common-variables
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ytd}:${POSTGRES_PASSWORD:-ytd_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ytd_db}?sslmode=disable"
      REDIS_URL: "redis://redis:${REDIS_PORT:-6379}"
      REDPANDA_BROKERS: "redpanda:${REDPANDA_KAFKA_PORT:-9092}"
      S3_ENDPOINT: "http://minio:${MINIO_PORT:-9000}"
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS:-ytd-videos}
      S3_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-ytd-thumbnails}
      S3_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-ytd-exports}
      S3_REGION: ${AWS_REGION:-us-east-1}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me}
      API_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ytd-network
    volumes:
      - ./backend:/app:rw
      - go_mod_cache:/go/pkg/mod


  # ---------------------------------------------------------------------------
  # Workers (background job processors)
  # ---------------------------------------------------------------------------
  workers:
    profiles:
      - full
    build:
      context: workers/
      dockerfile: Dockerfile
      target: development
    container_name: ytd-workers
    restart: unless-stopped
    environment:
      <<: *common-variables
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ytd}:${POSTGRES_PASSWORD:-ytd_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ytd_db}?sslmode=disable"
      REDIS_URL: "redis://redis:${REDIS_PORT:-6379}"
      REDPANDA_BROKERS: "redpanda:${REDPANDA_KAFKA_PORT:-9092}"
      S3_ENDPOINT: "http://minio:${MINIO_PORT:-9000}"
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS:-ytd-videos}
      S3_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-ytd-thumbnails}
      S3_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ytd-network
    volumes:
      - ./workers:/app:rw
      - go_mod_cache:/go/pkg/mod


  # ---------------------------------------------------------------------------
  # Data Platform - Analytics API
  # ---------------------------------------------------------------------------
  analytics-api:
    profiles:
      - full
    build:
      context: data-platform/
      dockerfile: analytics-api/Dockerfile
    container_name: ytd-analytics-api
    restart: unless-stopped
    ports:
      - "${ANALYTICS_API_PORT:-3001}:3001"
    environment:
      <<: *common-variables
      DUCKDB_DATABASE_URL: "/duckdb/data/analytics.duckdb"
      S3_ENDPOINT: "http://minio:${MINIO_PORT:-9000}"
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ICEBERG_CATALOG: ${ICEBERG_CATALOG:-memory}
    depends_on:
      duckdb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ytd-network
    volumes:
      - ./data-platform:/app:rw
      - duckdb_data:/duckdb/data
      - go_mod_cache:/go/pkg/mod


  # ---------------------------------------------------------------------------
  # Data Platform - Export Service
  # ---------------------------------------------------------------------------
  export-service:
    profiles:
      - full
    build:
      context: data-platform/
      dockerfile: export-service/Dockerfile
    container_name: ytd-export-service
    restart: unless-stopped
    environment:
      <<: *common-variables
      DUCKDB_DATABASE_URL: "/duckdb/data/analytics.duckdb"
      S3_ENDPOINT: "http://minio:${MINIO_PORT:-9000}"
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-ytd-exports}
    depends_on:
      duckdb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ytd-network
    volumes:
      - ./data-platform:/app:rw
      - duckdb_data:/duckdb/data
      - go_mod_cache:/go/pkg/mod

  # ---------------------------------------------------------------------------
  # Data Platform - DuckDB Worker
  # ---------------------------------------------------------------------------
  duckdb-worker:
    profiles:
      - full
    build:
      context: data-platform/
      dockerfile: duckdb-worker/Dockerfile
    container_name: ytd-duckdb-worker
    restart: unless-stopped
    environment:
      <<: *common-variables
      KAFKA_BROKERS: "redpanda:9092"
    depends_on:
      - redpanda
    networks:
      - ytd-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  ytd-network:
    driver: bridge
    name: ytd-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local
  minio_data:
    driver: local
  duckdb_data:
    driver: local
  go_mod_cache:
    driver: local
