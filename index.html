<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sant-serif; background:#1a1a1a; color:#fff; min-height:100vh; }
header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:2rem; text-align:center; }
header h1 { font-size:2.5rem; margin:0; }
header p { margin-top:.5rem; opacity:.9; }
.container { max-width:1200px; margin:0 auto; padding:2rem; }
.form { max-width:400px; margin:2rem auto; }
.form h2 { text-align:center; margin-bottom:1.5rem; }
input,select { background:#3d3d3d; border:1px solid #555; color:#fff; padding:.75rem; border-radius:4px; width:100%; margin-bottom:1rem; box-sizing:border-box; }
input:focus,select:focus { outline:none; border-color:#667eea; }
.btn { background:#667eea; color:#fff; border:none; padding:.75rem 1.5rem; border-radius:4px; cursor:pointer; font-size:1rem; width:100%; }
.btn:hover { background:#5a67d8; }
.btn-outline { background:transparent; border:1px solid #555; color:#fff; }
.alert { padding:1rem; border-radius:4px; margin-bottom:1rem; }
.alert.success { background:#10b981; }
.alert.error { background:#ef4444; }
.card { background:#2d2d2d; border-radius:8px; padding:1.5rem; margin-bottom:1rem; }
.card h4 { margin-bottom:.5rem; color:#667eea; }
.card p { margin-bottom:.25rem; color:#ccc; font-size:.9rem; }
a { color:#667eea; cursor:pointer; }
.form-footer { text-align:center; margin-top:1rem; }
.topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
.topbar h2 { margin:0; }
.logout-btn { background:#667eea; color:#fff; border:none; padding:.5rem 1rem; border-radius:4px; cursor:pointer; flex-row { display:flex; gap:.5rem; } .flex-row > * { flex:1; }
.badge { padding:.25rem .75rem; border-radius:20px; font-size:.75rem; font-weight:500; }
.badge-pending { background:rgba(234,179,8,.2); color:#eab308; }
.badge-completed { background:rgba(34,197,94,.2); color:#22c55e; }
.badge-failed { background:rgba(239,68,68,.2); color:#ef4444; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const API_BASE = 'https://youtube-downloader.onrender.com';

const token = () => localStorage.getItem('access_token');
const user = () => localStorage.getItem('username');

function route() {
  const hash = window.location.hash.replace('#','') || '/';
  const app = document.getElementById('app');
  if (hash === '/login') return renderLogin(app);
  if (hash === '/register') return renderRegister(app);
  if (!token()) { window.location.hash = '#/login'; return; }
  if (hash === '/' || hash === '/dashboard') return renderDashboard(app);
  renderDashboard(app);
}

function header(title, sub) {
  return `<header><h1>${title}</h1>${sub ? `<p>${sub}</p>`:''}</header>`;
}

function renderLogin(app) {
  app.innerHTML = `
    ${header('YouTube Downloader','Sign in to your account')}
    <div class="container">
      <div class="form">
        <h2>Login</h2>
        <div id="alert"></div>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button class="btn" onclick="doLogin()">Login</button>
        <p class="form-footer">Don't have an account? <a onclick="window.location.hash='#/register'">Register</a></p>
      </div>
    </div>`;
}

function renderRegister(app) {
  app.innerHTML = `
    ${header('YouTube Downloader','Create a new account')}
    <div class="container">
      <div class="form">
        <h2>Register</h2>
        <div id="alert"></div>
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button class="btn" onclick="doRegister()">Register</button>
        <p class="form-footer">Already have an account? <a onclick="window.location.hash='#/login'">Login</a></p>
      </div>
    </div>`;
}

function renderDashboard(app) {
  app.innerHTML = `
    ${header('YouTube Downloader','Welcome back, '+ (user()||'User')+'!')
    <div class="container">
      <div class="topbar">
        <h2>Your Downloads</h2>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
      <div class="card">
        <h3 style="margin-bottom:1rem;color:#fff;">Add New Download</h3>
        <div id="dlAlert"></div>
        <input type="text" id="ytUrl" placeholder="YouTube URL">
        <div class="flex-row">
          <select id="quality"><option value="720p">720p (HD)</option><option value="1080p">1080p (FHD)</option><option value="1440p">1440p (QHD)</option><option value="4k">4K (UHD)</option></select>
          <select id="format"><option value="mp4">MP4</option><option value="mp3">MP3</option><option value="webm">WEBM</option></select>
        </div>
        <button class="btn" onclick="createDownload()" style="margin-top:.5rem;">Download</button>
      </div>
      <div id="downloads"><p style="color:#888;">Loading downloads...</p></div>
    </div>`;
  loadDownloads();
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<div class="alert ${type}">${msg}</div>`;
}

async function api(path, opts={}) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', ...(token()?{'Authorization':'Bearer '+token()}:{}), ...opts.headers }
  });
  return res.json();
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  const data = await api('/api/v1/auth/login', { method:'POST', body:JSON.stringify({email,password:pass}) });
  if (data.access_token) {
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('username', email.split('@')[0]);
    window.location.hash = '#/';
  } else { showAlert('alert', data.error||'Login failed', 'error'); }
}

async function doRegister() {
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  const data = await api('/api/v1/auth/register', { method:'POST', body:JSON.stringify({username,email,password:pass}) });
  if (data.access_token) {
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('username', username);
    window.location.hash = '#/';
  } else { showAlert('alert', data.error||'Registration failed', 'error'); }
}

function doLogout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('username');
  window.location.hash = '#/login';
}

async function createDownload() {
  const url = document.getElementById('ytUrl').value;
  const quality = document.getElementById('quality').value;
  const format = document.getElementById('format').value;
  if (!url) return showAlert('dlAlert','Please enter a URL','error');
  const data = await api('/api/v1/downloads', { method:'POST', body:JSON.stringify({youtube_url:url,quality,format}) });
  if (data.download_id) { showAlert('dlAlert','Download created! Status: '+data.status,'success'); loadDownloads(); }
  else { showAlert('dlAlert', data.error||'Failed to create download','error'); }
}

async function loadDownloads() {
  const el = document.getElementById('downloads');
  if (!el) return;
  el.innerHTML = '<p style="color:#888;">Loading downloads...</p>';
  try {
    const res = await fetch(API_BASE+'/api/v1/downloads', { headers:{'Authorization':'Bearer '+token()} });
    const data = await res.json();
    if (Array.isArray(data.downloads) && data.downloads.length) {
      el.innerHTML = data.downloads.map(d=>`<div class="card"><h4>${d.youtube_url||'Untitled'}</h4><p>Quality: ${d.requested_quality||'N/A'}</p><p>Format: ${d.requested_format||'N/A'}</p><p>Status: <span class="badge badge-${(d.status||'pending').toLowerCase()}">${d.status||'Pending'}</span></p><p>Created: ${new Date(d.created_at).toLocaleString()}</p></div>`).join('');
    } else if (Array.isArray(data.downloads)) {
      el.innerHTML = '<p style="color:#888;">No downloads yet.</p>';
    } else {
      el.innerHTML = '<p style="color:#888;">No downloads yet.</p>';
    }
  } catch(e) { el.innerHTML = '<p style="color:#888;">No downloads yet.</p>'; }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', route);
</script>

</body>
</html>
